name: 🐉 CI

on:
  push:
    branches: ["main", "fix/*", "feat/*"]
    tags:
      - 'v*'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        env:
          # 仅装核心 + ths（CI 上不装 baostock/tushare/lancedb 等重型可选包）
          PIP_NO_BINARY: 'baostock'
        run: |
          python -m pip install --upgrade pip
          # 安装核心依赖 + 同花顺自动化（CI 上可获取）
          pip install -e ".[dev,ths]"
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Test (pytest)
        run: pytest tests/unit -q --tb=short

  build-frontend:
    name: Build Frontend
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install & Build Frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Verify build output
        run: |
          if (Test-Path "src/frontend/dist/index.html") {
            Write-Host "✅ Frontend build OK"
          } else {
            Write-Host "❌ Frontend dist/index.html missing"
            exit 1
          }
        shell: pwsh

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
          retention-days: 7

  release-source:
    name: Release Source (on tag)
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint-and-test, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source zipball
        run: |
          # 排除不必要的大目录，减小体积
          mkdir -p release
          git archive --format=zip --prefix=Attract-wealth/ HEAD \
            -o release/Attract-wealth-src.zip
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
          body: |
            ## 🐉 来财 (LaiCai) 源码包

            ### 快速开始（Windows）
            1. 下载并解压源码包
            2. 双击 `一键启动.bat`（自动检测 Python/依赖/前端并启动）
            3. 浏览器打开 http://127.0.0.1:8000

            ### 手动安装
            详见仓库 README.md「部署」章节。
