name: 🐉 Build Windows Package

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装项目本身 (包含所有 Python 依赖)
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run PyInstaller
        working-directory: ${{ github.workspace }}
        run: |
          pyinstaller scripts/installer/laiCai.spec --clean --noconfirm
        shell: pwsh

      - name: Verify Build Output
        run: |
          Write-Host "Build Directory Contents:"
          Get-ChildItem -Path "dist/laiCai" -Recurse | Format-Table Name, Length
        shell: pwsh

      - name: Prepare Release Package
        run: |
          New-Item -ItemType Directory -Force -Path "dist/release"
          Copy-Item -Recurse -Force -Path "dist/laiCai" -Destination "dist/release/laiCai"
          Copy-Item -Force -Path "scripts/start.bat" -Destination "dist/release/start.bat"
          New-Item -ItemType Directory -Force -Path "dist/release/config"
          if (Test-Path ".env.example") {
            Copy-Item -Force -Path ".env.example" -Destination "dist/release/config/.env.example"
          }
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaiCai-Windows-x64
          path: dist/release/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**
          draft: false
          generate_release_notes: true
