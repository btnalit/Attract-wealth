name: 🐉 Build Windows Package

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Verify THS Resolver
        run: |
          python -c "from src.core.ths_path_resolver import ThsPathResolver; print('THS Resolver OK')"

      - name: Run PyInstaller
        run: |
          pyinstaller scripts/installer/laiCai.spec --clean --noconfirm
        shell: pwsh

      - name: Prepare Release Assets
        run: |
          # Create a directory for the final release package
          New-Item -ItemType Directory -Force -Path "dist/release"
          # Copy the PyInstaller build
          Copy-Item -Recurse -Force -Path "dist/laiCai" -Destination "dist/release/laiCai"
          # Copy start script
          Copy-Item -Force -Path "scripts/start.bat" -Destination "dist/release/start.bat"
          # Copy config templates
          New-Item -ItemType Directory -Force -Path "dist/release/config"
          Copy-Item -Force -Path ".env.example" -Destination "dist/release/config/.env.example"
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaiCai-Windows-x64
          path: dist/release/

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**
          draft: false
          generate_release_notes: true
