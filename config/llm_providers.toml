# =============================================
# LLM Provider 配置 (OpenAI 兼容协议)
# =============================================

# 默认 Provider
[default]
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
# api_key 从环境变量 LLM_API_KEY 读取

# 深度思考 (复杂分析)
[deep]
model = "deepseek-reasoner"
temperature = 0.3
max_tokens = 8192

# 快速任务
[quick]
model = "deepseek-chat"
temperature = 0.5
max_tokens = 2048

